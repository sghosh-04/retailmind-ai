version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm@latest
        - pnpm install
    build:
      commands:
        - env | grep -E 'MY_AWS_|NEXT_PUBLIC_|JWT_SECRET|GROQ_API_KEY|GEMINI_API_KEY|GOOGLE_API_KEY|PUTER_AUTH_TOKEN|CLAUDE_API_KEY|DYNAMODB_PREFIX' >> .env.production
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*